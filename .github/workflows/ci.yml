name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Unit tests
        run: cargo test
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Format
        run: cargo fmt --check

  integration:
    name: Integration tests (Linux + Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out registry
        uses: actions/checkout@v4
        with:
          repository: mlberkeley/bv-registry
          path: bv-registry
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Integration tests
        run: |
          cargo test --test integration -- --include-ignored --skip alphafold
        env:
          BV_REGISTRY: ${{ github.workspace }}/bv-registry

  integration-apptainer:
    name: Integration tests (Linux + Apptainer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out registry
        uses: actions/checkout@v4
        with:
          repository: mlberkeley/bv-registry
          path: bv-registry
      - uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Integration tests (Apptainer backend)
        run: |
          cargo test --test integration -- --include-ignored --skip alphafold
        env:
          BV_REGISTRY: ${{ github.workspace }}/bv-registry
          BV_BACKEND: apptainer
